    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        :root { --brand: #F3BA2F; --gold-glow: rgba(243, 186, 47, 0.4); }
        * { box-sizing: border-box; margin: 0; padding: 0; scroll-behavior: smooth; }
        body { font-family: 'Inter', sans-serif; background-color: #030303; color: #fff; overflow-x: hidden; width: 100%; }
        
        .bg-grid { 
            background-image: linear-gradient(to right, rgba(255,255,255,0.03) 1px, transparent 1px), linear-gradient(to bottom, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 40px 40px;
            animation: gridMove 30s linear infinite;
        }
        @keyframes gridMove { from { background-position: 0 0; } to { background-position: 40px 40px; } }

        .fire-particle {
            position: absolute; width: 3px; height: 3px; background: var(--brand);
            border-radius: 50%; filter: blur(2px); animation: rise 4s infinite ease-in; opacity: 0;
        }
        @keyframes rise {
            0% { transform: translateY(0) scale(1); opacity: 0; }
            50% { opacity: 0.8; box-shadow: 0 0 10px var(--brand); }
            100% { transform: translateY(-100vh) scale(0); opacity: 0; }
        }

        .gold-text { 
            background: linear-gradient(90deg, #F3BA2F, #FFF, #B8860B, #F3BA2F);
            background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
            animation: shine 4s linear infinite; font-weight: 900;
        }
        @keyframes shine { to { background-position: 200% center; } }

        .hero-glow { filter: drop-shadow(0 0 30px var(--gold-glow)); animation: pulseGlow 4s infinite ease-in-out; }
        @keyframes pulseGlow { 0%, 100% { filter: drop-shadow(0 0 30px var(--gold-glow)); } 50% { filter: drop-shadow(0 0 60px var(--brand)); } }
        
        .btn-burnie {
            background: var(--brand); color: #000; font-weight: 900;
            padding: 1rem 2rem; border-radius: 99px; text-transform: uppercase;
            box-shadow: 0 0 20px rgba(243, 186, 47, 0.3); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex; align-items: center; justify-content: center;
            font-size: clamp(0.8rem, 2vw, 1rem); letter-spacing: 0.1em;
        }
        .btn-burnie:hover { transform: translateY(-3px) scale(1.02); box-shadow: 0 10px 40px rgba(243, 186, 47, 0.6); }

        .card-glass { 
            background: linear-gradient(145deg, rgba(255,255,255,0.03) 0%, rgba(255,255,255,0.01) 100%);
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(20px); border-radius: clamp(20px, 5vw, 30px); transition: 0.5s;
            position: relative; overflow: hidden;
        }
        .card-glass:hover { border-color: rgba(243, 186, 47, 0.4); background: rgba(243, 186, 47, 0.02); box-shadow: 0 10px 40px rgba(0,0,0,0.5); }

        .phase-locked { filter: grayscale(1); opacity: 0.4; border: 2px dashed rgba(255,255,255,0.1) !important; }

        .reveal { opacity: 0; transform: translateY(40px); transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1); }
        .reveal.active { opacity: 1; transform: translateY(0); }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-20px); } }
        .animate-float { animation: float 6s ease-in-out infinite; }
        
        .staking-input-sim { background: rgba(0,0,0,0.6); box-shadow: inset 0 2px 15px rgba(0,0,0,0.9); }
        .highlight-box { border-left: 4px solid var(--brand); padding-left: 1.5rem; }
    </style>
</head>

        const container = document.getElementById('fire-container');

            container.appendChild(p);

        const obs = new IntersectionObserver((entries) => {
            entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('active'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.reveal').forEach(el => obs.observe(el));

        function toggleBlueprint() {
            document.getElementById('blueprint-modal').classList.toggle('hidden');

        const content = {
            en: {
                nav_bp: "The Blueprint", nav_buy: "Build Now",
                h_title: "We Don't Follow Trends. <br> <span class='gold-text'>We Build Monuments.</span>",
                btn_main: "Join the Blueprint",
                bp_title: "The Golden Blueprint",
                bp: `<div class="highlight-box"><p class="text-white italic text-2xl md:text-3xl font-[1000] leading-tight">"This is not just another token. This is THE project. Built from scratch. No VCs. No ghost investors. No hidden agendas."</p></div>
                     <p>The modern crypto space is plagued by fragile foundations and scam-ridden launches. We reject that reality. <strong>$BURNIE</strong> is engineered to be a community-led fortress, forged through transparency and strategic sacrifice.</p>
